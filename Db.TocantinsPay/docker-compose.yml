services:
  tocantinspay-db:
    image: postgres:17
    networks:
      - tocantinspay-network
    container_name: tocantinspay-db
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=tocantinspay
    ports:
      - 5490:5432
    volumes:
      - ./scripts:/docker-entrypoint-initdb.d
      - tocantinspay-db-data:/var/lib/postgresql/data
    restart: always

volumes:
  tocantinspay-db-data:
    name: tocantinspay-db-data

networks:
  tocantinspay-network:
    external: true
